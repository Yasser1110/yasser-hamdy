<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yasser Hamdy | Cybersecurity Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #e5e5e5; }
        .hero {
            background: linear-gradient(rgba(5,5,5,0.75), rgba(5,5,5,0.85)),
                        url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat;
        }
        .glass { background: rgba(15,15,15,0.75); backdrop-filter: blur(20px); }
        .accent { color: #ff3b3b; }
        .card-hover:hover { transform: translateY(-10px); transition: all 0.4s; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="fixed top-0 w-full glass z-50 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="text-2xl font-bold tracking-tighter">Yasser<span class="accent">.</span>Hamdy</div>

            <!-- Desktop links -->
            <div class="hidden md:flex gap-8 text-sm font-medium">
                <a href="index.html" class="hover:text-red-500 transition">Home</a>
                <a href="about.html" class="hover:text-red-500 transition">About</a>
                <a href="projects.html" class="hover:text-red-500 transition">Projects</a>
                <a href="services.html" class="hover:text-red-500 transition">Services</a>
                <a href="contact.html" class="hover:text-red-500 transition">Contact</a>
            </div>

            <!-- Mobile hamburger -->
            <button onclick="document.getElementById('mobileMenu').classList.toggle('hidden')" class="md:hidden text-2xl">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <!-- Mobile menu -->
        <div id="mobileMenu" class="hidden md:hidden flex flex-col gap-4 px-6 pb-6 text-sm font-medium border-t border-white/10 pt-4">
            <a href="index.html" class="hover:text-red-500 transition">Home</a>
            <a href="about.html" class="hover:text-red-500 transition">About</a>
            <a href="projects.html" class="hover:text-red-500 transition">Projects</a>
            <a href="services.html" class="hover:text-red-500 transition">Services</a>
            <a href="contact.html" class="hover:text-red-500 transition">Contact</a>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero min-h-screen flex items-center relative">
        <div class="max-w-7xl mx-auto px-6 z-10">
            <h1 class="text-4xl sm:text-5xl md:text-7xl font-bold leading-tight md:leading-none mb-6 md:mb-8">
                Secure.<br>
                Build.<br>
                <span class="accent">Defend.</span>
            </h1>
            <p class="text-base sm:text-xl md:text-2xl text-gray-300 max-w-2xl mb-8 md:mb-10">
                Cybersecurity Engineer & Penetration Tester<br>
                Turning threats into opportunities.
            </p>
            <div class="flex flex-col sm:flex-row gap-4 sm:gap-6">
                <a href="contact.html" class="bg-red-600 hover:bg-red-700 px-6 sm:px-10 py-4 sm:py-5 rounded-2xl text-base sm:text-lg font-semibold text-center">Book Free Consultation</a>
                <a href="projects.html" class="border border-white/40 hover:bg-white/10 px-6 sm:px-10 py-4 sm:py-5 rounded-2xl text-base sm:text-lg text-center">View Projects</a>
            </div>
        </div>
    </section>

    <!-- Quick Stats -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 -mt-10 sm:-mt-12 relative z-20">
        <div class="grid grid-cols-3 gap-2 sm:gap-6 bg-zinc-950 border border-white/10 rounded-2xl sm:rounded-3xl p-4 sm:p-8">
            <div class="text-center">
                <div class="text-2xl sm:text-4xl font-bold accent">8+</div>
                <div class="text-xs sm:text-sm text-gray-400">HackerOne Reports</div>
            </div>
            <div class="text-center">
                <div class="text-2xl sm:text-4xl font-bold accent">98%</div>
                <div class="text-xs sm:text-sm text-gray-400">CCNA Score</div>
            </div>
            <div class="text-center">
                <div class="text-2xl sm:text-4xl font-bold accent">3rd</div>
                <div class="text-xs sm:text-sm text-gray-400">Sharjah Competition</div>
            </div>
        </div>
    </div>
</body>
</html>
