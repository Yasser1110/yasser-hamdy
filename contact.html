<form id="meetingForm" class="space-y-5 sm:space-y-6">
<div class="grid md:grid-cols-2 gap-5 sm:gap-6">
<div>
<label class="block mb-2 text-sm">الاسم الكامل</label>

<div>

</div>
</div>
<div>
<label class="block mb-2 text-sm">البريد الإلكتروني</label>
<input type="email" id="email" required class="w-full bg-zinc-900 border border-white/20 rounded-2xl px-4 sm:px-6 py-3 sm:py-4 focus:outline-none focus:border-red-500">
</div>
<div>

<input type="datetime-local" id="datetime" required class="w-full bg-zinc-900 border border-white/20 rounded-2xl px-4 sm:px-6 py-3 sm:py-4 focus:outline-none focus:border-red-500">
</div>
<div>

<option>Secure Web Development</option>
<option>VoIP & Network Security</option>
<option>Security Automation Tools</option>
<option>General Consultation</option>

<button type="submit"
class="w-full bg-red-600 hover:bg-red-700 py-4 sm:py-6 rounded-2xl text-base sm:text-lg font-semibold transition">
Book My Free 30-Minute Meeting
</button>

email: document.getElementById('email').value,
datetime: document.getElementById('datetime').value,
type: document.getElementById('type').value,
timestamp: new Date().toLocaleString('ar-EG')
};
console.log("New Meeting Request:", formData);
alert("✅ تم إرسال طلب الحجز بنجاح!\nسأتواصل معك قريباً على الإيميل.");

});
